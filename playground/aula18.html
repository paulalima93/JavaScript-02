<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Área de Testes - Mini Desafios - 18</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
        }

        input,
        textarea {
            padding: 8px;
            margin: 5px;
            width: 80%;
            max-width: 300px;
        }

        .caixa {
            border: 1px solid #ccc;
            padding: 20px;
            margin-top: 20px;
            min-height: 50px;
        }

        /* Classe para o desafio da Aula 15 */
        .modo-escuro {
            background-color: #222;
            color: #fff;
        }

        /* Estilo básico para listas */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f0f0f0;
            margin: 5px auto;
            padding: 10px;
            max-width: 300px;
            display: flex;
            justify-content: space-between;
            color: #000;
        }
    </style>
</head>

<body>
    <!-- HTML da aula -->
    <button id="verTudo" onclick="filtrar('tudo')">Ver tudo</button>
    <button id="soAzul" onclick="filtrar('azul')">Só azul</button>

    <ul id="lista">

    </ul>
    <script>
        const listaRef= document.getElementById('lista');
        const roupas = [{peca: "Camisa", cor: "azul"}, {peca: "Calça", cor: "preta"}, {peca: "Boné", cor: "azul"}];

        function filtrar(corSolicitada){
            if(corSolicitada === 'azul'){
                let listaProvisoria = roupas.filter(roupa => roupa.cor === corSolicitada);
                renderizar(listaProvisoria)
            }else{
                renderizar(roupas)
            }
        }

        function renderizar(lista) {
            listaRef.innerHTML = ""; // 1. Limpa tudo
            // 2. Reconstrói baseado nos dados
            lista.forEach(roupa => {
                listaRef.innerHTML += `<li>${roupa.peca}- ${roupa.cor}</li>`;
            });
        }
        renderizar(roupas)
    </script>

</body>

</html>
