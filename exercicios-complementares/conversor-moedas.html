<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Desafio 05 - Conversor</title>
    <style>
        body { font-family: sans-serif; background: #ecfdf5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); text-align: center; border: 2px solid #10b981; }
        input { padding: 12px; font-size: 1.2rem; width: 150px; border-radius: 10px; border: 1px solid #ccc; margin: 10px; }
        #resultado { font-size: 2rem; color: #065f46; font-weight: bold; margin-top: 20px; }
        .label-moeda { font-weight: bold; color: #059669; }
    </style>
</head>
<body>
    <div class="box">
        <h2>💰 Conversor de Moeda</h2>
        <div>
            <span class="label-moeda">R$</span>
            <input type="number" id="valorReal" placeholder="0,00">
        </div>
        <button id="btnConverter" style="padding: 10px 20px; border-radius: 8px; background: #10b981; color: white; border: none; cursor: pointer;">Converter para US$</button>
        <div id="resultado">US$ 0,00</div>
    </div>

                const botaoConverter = document.getElementById("btnConverter");
                const resultado = document.getElementById("resultado");

                const cotacao = 5.00;

                function converter() {
                    let valor = Number(inputValor.value);
                    let valorConvertido = valor / cotacao;

                    if(!valor || valor <=0){
                        resultado.textContent = "US$ 0,00"

                    resultado.textContent = formatado;

                botaoConverter.addEventListener("click", converter);
        
    </script>
</body>
</html>
